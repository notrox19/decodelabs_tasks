<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expense Tracker Pro</title>

<style>
body {
    font-family: Arial;
    background: #f8fafc;
    padding: 20px;
}

/* HEADER */
h1 {
    color: #ff6600;
    text-align: center;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ddd;
}

/* BUTTON */
button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}
button:hover {
    transform: scale(1.05);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #ff6600;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f1f5f9;
}

/* COLORS */
.income { color: green; font-weight: bold; }
.expense { color: red; font-weight: bold; }

/* SUMMARY */
.summary {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>💰 Expense Tracker Pro</h1>

<div class="card">
<h2>Add Transaction</h2>

<input id="title" placeholder="Title">
<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<input id="category" placeholder="Category">

<button onclick="add()">Add</button>
</div>

<div class="card">
<h2>Transactions</h2>

<input id="filter" placeholder="Search category..." onkeyup="filterCategory()">

<div class="summary" id="balance">Balance: ₹0</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Amount</th>
<th>Type</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

const API = "http://localhost:9092/api/expenses";
let all = [];

// LOAD
function load() {
    fetch(API)
    .then(res => res.json())
    .then(data => {
        all = data;
        render(data);
        updateSummary();
    });
}

// RENDER
function render(data) {
    let html = "";
    data.forEach(e => {
        html += `
        <tr>
            <td>${e.id}</td>
            <td>${e.title}</td>
            <td class="${e.type === 'Income' ? 'income' : 'expense'}">₹${e.amount}</td>
            <td>${e.type}</td>
            <td>${e.category}</td>
            <td>
                <button onclick="edit(${e.id})">Edit</button>
                <button onclick="del(${e.id})">Delete</button>
            </td>
        </tr>`;
    });
    document.getElementById("table").innerHTML = html;
}

// ADD
function add() {
    const title = document.getElementById("title").value;
    const amount = document.getElementById("amount").value;
    const type = document.getElementById("type").value;
    const category = document.getElementById("category").value;

    if (!title || !amount || !category) {
        alert("Fill all fields!");
        return;
    }

    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title, amount, type, category })
    }).then(() => {
        clearFields();
        load();
    });
}

// DELETE
function del(id) {
    fetch(API + "/" + id, { method: "DELETE" })
        .then(load);
}

// EDIT
function edit(id) {
    const title = prompt("New title:");
    const amount = prompt("New amount:");
    const type = prompt("Income or Expense:");
    const category = prompt("New category:");

    if (!title || !amount || !type || !category) return;

    fetch(API + "/" + id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title, amount, type, category })
    }).then(load);
}

// SUMMARY
function updateSummary() {
    let income = 0;
    let expense = 0;

    all.forEach(e => {
        if (e.type === "Income") income += Number(e.amount);
        else expense += Number(e.amount);
    });

    document.getElementById("balance").innerText =
    'Balance: ₹${income - expense} | Income: ₹${income} | Expense: ₹${expense}';
}

// FILTER
function filterCategory() {
    const val = document.getElementById("filter").value.toLowerCase();
    const filtered = all.filter(e =>
        e.category.toLowerCase().includes(val)
    );
    render(filtered);
}

// CLEAR INPUTS
function clearFields() {
    document.getElementById("title").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("category").value = "";
}

// AUTO LOAD
load();

</script>

</body>
</html>
